services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taricai
      POSTGRES_USER: taricai
      POSTGRES_PASSWORD: taricai_dev_2025
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
